<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片导入工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f1e7e3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      width: 500px;
      text-align: center;
    }

    h1 {
      color: #1e90ff;
      margin-bottom: 20px;
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 15px;
    }

    .file-input {
      display: none;
    }

    .file-input-label {
      display: inline-block;
      padding: 10px 20px;
      background-color: #1e90ff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .file-input-label:hover {
      background-color: #1873cc;
    }

    /* 反相选项 */
    .invert-option {
      margin: 12px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #555;
    }

    .invert-option input {
      transform: scale(1.2);
    }

    .preview-container {
      margin: 20px 0;
      min-height: 200px;
      border: 2px dashed #e0f0ff;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
    }

    .preview-image {
      max-width: 100%;
      max-height: 200px;
      border-radius: 6px;
    }

    .placeholder-text {
      color: #87cefa;
    }

    .import-btn {
      padding: 10px 20px;
      background-color: #1e90ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }

    .import-btn:hover:not(:disabled) {
      background-color: #1873cc;
    }

    .import-btn:disabled {
      background-color: #e0f0ff;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>图片导入工具</h1>
    <div class="file-input-wrapper">
      <input type="file" id="fileInput" class="file-input" accept=".png">
      <label for="fileInput" class="file-input-label">选择 PNG 图片</label>
    </div>

    <!-- 反相选项 -->
    <div class="invert-option">
      <input type="checkbox" id="invertCheckbox">
      <label for="invertCheckbox">启用反相</label>
    </div>

    <div class="preview-container" id="previewContainer">
      <span class="placeholder-text">图片预览区域</span>
    </div>
    <button id="importBtn" class="import-btn" disabled>导入</button>
  </div>

<script>
  const fileInput = document.getElementById('fileInput');
  const previewContainer = document.getElementById('previewContainer');
  const importBtn = document.getElementById('importBtn');
  const invertCheckbox = document.getElementById('invertCheckbox');

  let followInterval = null;
  let currentImageID = null;
  let originalImageData = null;

  // 文件选择
  fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file && file.type === 'image/png') {
      const reader = new FileReader();
      reader.onload = () => {
        originalImageData = reader.result;
        updatePreview();
        importBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    } else {
      alert('请选择有效的 PNG 图片！');
      resetPreview();
    }
  });

  // 反相复选框改变时更新预览
  invertCheckbox.addEventListener('change', () => {
    if (originalImageData) {
      updatePreview();
    }
  });

  function updatePreview() {
    if (!originalImageData) return;

    if (invertCheckbox.checked) {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          data[i] = 255 - data[i];
          data[i + 1] = 255 - data[i + 1];
          data[i + 2] = 255 - data[i + 2];
        }
        ctx.putImageData(imageData, 0, 0);
        previewContainer.innerHTML = `<img src="${canvas.toDataURL()}" class="preview-image" alt="预览">`;
      };
      img.src = originalImageData;
    } else {
      previewContainer.innerHTML = `<img src="${originalImageData}" class="preview-image" alt="预览">`;
    }
  }

  function resetPreview() {
    previewContainer.innerHTML = '<span class="placeholder-text">图片预览区域</span>';
    importBtn.disabled = true;
    originalImageData = null;
  }

  // 导入主逻辑
  importBtn.addEventListener('click', async function() {
    const file = fileInput.files[0];
    if (!file) return;

    if (followInterval) {
      clearInterval(followInterval);
      followInterval = null;
    }

    try {
      // 由 JS 完成图像处理（含反相），输出处理后的 base64
      const base64 = await getProcessedBase64();

      // 从处理后的图像读取尺寸
      const img = new Image();
      await new Promise(resolve => { img.onload = resolve; img.src = base64; });
      const width = img.width;
      const height = img.height;

      const pt = await eda.pcb_SelectControl.getCurrentMousePosition();

      // 始终使用内嵌二进制对象，不使用复杂多边形
      const obj = eda.pcb_PrimitiveObject.create(
        EPCB_LayerId.TOP_SILKSCREEN,
        pt.x, pt.y,
        base64,
        width, height,
        0, false, 'img', false
      );
      const ID = (await obj).getState_PrimitiveId();
      currentImageID = ID;

      showMessage(invertCheckbox.checked ? '反相图片已附着到鼠标，请点击画布放置' : '图片已附着到鼠标，请点击画布放置');

      followInterval = setInterval(async () => {
        try {
          const pos = await eda.pcb_SelectControl.getCurrentMousePosition();
          await eda.pcb_PrimitiveObject.modify(currentImageID, { topLeftX: pos.x, topLeftY: pos.y });
        } catch (err) {
          if (followInterval) { clearInterval(followInterval); followInterval = null; }
        }
      }, 16);

    } catch (error) {
      console.error('导入失败:', error);
      showMessage('导入失败: ' + (error.message || String(error)));
    }
  });

  // 由 JS 处理图像（反相），返回 base64
  function getProcessedBase64() {
    return new Promise((resolve, reject) => {
      if (!originalImageData) { reject(new Error('无图像数据')); return; }
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        if (invertCheckbox.checked) {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            data[i]     = 255 - data[i];
            data[i + 1] = 255 - data[i + 1];
            data[i + 2] = 255 - data[i + 2];
            // alpha 通道不变
          }
          ctx.putImageData(imageData, 0, 0);
        }
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = reject;
      img.src = originalImageData;
    });
  }

  // 失去焦点时自动放置
  window.onblur = () => {
    if (followInterval) {
      clearInterval(followInterval);
      followInterval = null;
      currentImageID = null;
      showMessage("图片已放置");
    }
  };

  // ESC 取消
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && followInterval) {
      clearInterval(followInterval);
      followInterval = null;
      currentImageID = null;
      showMessage("已取消放置");
    }
  });

  // 消息提示
  function showMessage(text) {
    if (!document.getElementById('msg-style')) {
      const style = document.createElement('style');
      style.id = 'msg-style';
      style.textContent = `
        .eda-message {
          position: fixed;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: #1e90ff;
          color: white;
          padding: 10px 20px;
          border-radius: 6px;
          box-shadow: 0 3px 10px rgba(0,0,0,0.2);
          z-index: 10000;
          animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
          0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
          10% { opacity: 1; transform: translateX(-50%) translateY(0); }
          90% { opacity: 1; }
          100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
      `;
      document.head.appendChild(style);
    }

    const el = document.createElement('div');
    el.className = 'eda-message';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
</script>
</body>
</html>
