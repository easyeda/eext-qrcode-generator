<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历史记录</title>
  <link rel="stylesheet" href="/iframe/css/style.css" />
  <script src="/iframe/js/JsBarcode.all.min.js"></script>
  <script src="/iframe/js/qrcode.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="history-container">
    <div class="table-wrapper">
      <table class="history-table">
        <thead>
          <tr>
            <th style="width: 40px;"><input type="checkbox" id="select-all" /></th>
            <th style="width: 60px;">预览</th>
            <th onclick="sortTable('type')">类型 <span class="sort-icon">⇅</span><span class="filter-icon" id="toggle-filter">筛选</span></th>
            <th onclick="sortTable('size')">尺寸(mm) <span class="sort-icon">⇅</span></th>
            <th>内容 <span class="filter-icon" id="toggle-filter-2">筛选</span></th>
            <th onclick="sortTable('color')">彩色 <span class="sort-icon">⇅</span><span class="filter-icon" id="toggle-filter-3">筛选</span></th>
            <th>操作</th>
          </tr>
          <tr class="filter-row" id="filter-row" style="display: none;">
            <td></td>
            <td></td>
            <td><input type="text" class="filter-input" id="filter-type" placeholder="二维码/条形码"></td>
            <td></td>
            <td><input type="text" class="filter-input" id="filter-content" placeholder="关键词"></td>
            <td>
              <select class="filter-select" id="filter-color">
                <option value="">全部</option>
                <option value="是">是</option>
                <option value="否">否</option>
              </select>
            </td>
            <td></td>
          </tr>
        </thead>
        <tbody id="history-list">
          <tr class="empty-row">
            <td colspan="7">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="actions">
      <button id="batch-delete-btn" class="btn btn-danger" style="display:none;">批量删除</button>
      <button id="export-json-btn" class="btn btn-success">导出JSON</button>
      <button id="export-csv-btn" class="btn btn-success">导出CSV</button>
      <button id="clear-btn" class="btn btn-danger">清空全部</button>
      <button id="back-btn" class="btn btn-outline">关闭</button>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const HistoryList = document.getElementById('history-list');
  const BackButton = document.getElementById('back-btn');
  const ClearButton = document.getElementById('clear-btn');
  const BatchDeleteBtn = document.getElementById('batch-delete-btn');
  const ExportJsonBtn = document.getElementById('export-json-btn');
  const ExportCsvBtn = document.getElementById('export-csv-btn');
  const SelectAllCheckbox = document.getElementById('select-all');
  const filterRow = document.getElementById('filter-row');
  const filterTypeInput = document.getElementById('filter-type');
  const filterContentInput = document.getElementById('filter-content');
  const filterColorSelect = document.getElementById('filter-color');

  let allData = [];
  let sortColumn = 'timestamp';
  let sortDirection = 'desc';
  let followInterval = null;
  let currentImageID = null;
  let isCurrentColorImage = false;

  document.querySelectorAll('.filter-icon').forEach(icon => {
    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      filterRow.style.display = filterRow.style.display === 'none' ? '' : 'none';
      if (filterRow.style.display !== 'none') filterTypeInput.focus();
    });
  });

  function setupFilterListeners() {
    [filterTypeInput, filterContentInput].forEach(input => {
      input.addEventListener('input', applyFilters);
    });
    filterColorSelect.addEventListener('change', applyFilters);
  }

  function applyFilters() {
    const typeQuery = filterTypeInput.value.trim().toLowerCase();
    const contentQuery = filterContentInput.value.trim().toLowerCase();
    const colorQuery = filterColorSelect.value;
    const rows = HistoryList.querySelectorAll('tr:not(.empty-row)');
    let visibleCount = 0;

    rows.forEach(row => {
      const typeText = row.querySelector('.type-tag')?.textContent.trim().toLowerCase() || '';
      const contentText = row.querySelector('.content-cell')?.textContent.trim().toLowerCase() || '';
      const colorText = row.querySelector('td:nth-child(6)')?.dataset.color || '';
      const typeMatch = typeQuery === '' || typeText.includes(typeQuery);
      const contentMatch = contentQuery === '' || contentText.includes(contentQuery);
      const colorMatch = colorQuery === '' || colorText === colorQuery;

      if (typeMatch && contentMatch && colorMatch) {
        row.style.display = '';
        visibleCount++;
      } else {
        row.style.display = 'none';
      }
    });

    const emptyRow = HistoryList.querySelector('.empty-row');
    if (visibleCount === 0 && rows.length > 0) {
      if (!emptyRow) {
        const tr = document.createElement('tr');
        tr.className = 'empty-row';
        tr.innerHTML = '<td colspan="7" style="text-align:center;color:#6c757d;padding:20px 0;">无匹配记录</td>';
        HistoryList.appendChild(tr);
      }
    } else if (emptyRow) {
      emptyRow.remove();
    }
  }

  function showMessage(text) {
    if (!document.getElementById('message-style')) {
      const style = document.createElement('style');
      style.id = 'message-style';
      style.textContent = `
        @keyframes fadeInOut {
          0%   { opacity: 0; transform: translateX(-50%) translateY(-20px); }
          20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
          80%  { opacity: 1; transform: translateX(-50%) translateY(0); }
          100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .message {
          position: fixed;
          top: 20px;
          left: 50%;
          transform: translateX(-50%);
          background-color: #1e90ff;
          color: white;
          padding: 12px 24px;
          border-radius: 6px;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          z-index: 1000;
          animation: fadeInOut 3s forwards;
        }
      `;
      document.head.appendChild(style);
    }
    const el = document.createElement('div');
    el.className = 'message';
    el.textContent = text;
    document.body.appendChild(el);
    setTimeout(() => { if (document.body.contains(el)) el.remove(); }, 3000);
  }

  function showConfirmDialog(title, onConfirm) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:2000;';
    overlay.innerHTML = `<div style="background:white;padding:20px;border-radius:8px;max-width:300px;text-align:center;font-size:15px;"><div style="margin-bottom:16px;font-weight:600;">${title}</div><div style="display:flex;gap:10px;justify-content:center;"><button style="flex:1;padding:6px;border:1px solid #ccc;border-radius:4px;">取消</button><button style="flex:1;padding:6px;background:#dc3545;color:white;border:none;border-radius:4px;">确定</button></div></div>`;
    const cancel = overlay.querySelector('button');
    const confirm = overlay.querySelector('button:last-child');
    cancel.onclick = () => overlay.remove();
    confirm.onclick = () => { onConfirm(); overlay.remove(); };
    document.body.appendChild(overlay);
  }

  function sortTable(column) {
    if (sortColumn === column) {
      sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
      sortColumn = column;
      sortDirection = 'asc';
    }
    renderHistoryList(allData);
  }

  window.sortTable = sortTable;

  async function generateQRCode(content, color = '#000000') {
    return new Promise(resolve => {
      const canvas = document.createElement('canvas');
      QRCode.toCanvas(canvas, content, { width: 100, margin: 2, correctLevel: 3, color: { dark: color, light: '#ffffff' }}, err => resolve(err ? null : canvas));
    });
  }

  async function generateBarcode(content, color = '#000000') {
    try {
      const canvas = document.createElement('canvas');
      JsBarcode(canvas, content, { lineColor: color, format: 'CODE128', width: 2, height: 80, displayValue: false, margin: 5 });
      return canvas;
    } catch (e) {
      return null;
    }
  }

  async function deleteHistoryItem(key) {
    await eda.sys_Storage.setExtensionUserConfig(key, null);
    if (typeof eda.sys_Storage.deleteExtensionUserConfig === 'function') {
      await eda.sys_Storage.deleteExtensionUserConfig(key);
    }
  }

  async function loadHistory() {
    try {
      const all = await eda.sys_Storage.getExtensionAllUserConfigs();
      allData = Object.entries(all).filter(([k]) => k.includes('qrcode') || k.includes('barcode')).map(([k, v]) => ({ id: k, ...v }));
      renderHistoryList(allData);
    } catch (e) {
      HistoryList.innerHTML = '<tr class="empty-row"><td colspan="7">加载失败</td></tr>';
      showMessage('加载失败');
    }
  }

  async function renderHistoryList(data) {
    if (!data.length) {
      HistoryList.innerHTML = '<tr class="empty-row"><td colspan="7">暂无历史记录</td></tr>';
      return;
    }

    const sorted = [...data].sort((a, b) => {
      let aVal, bVal;
      if (sortColumn === 'type') {
        aVal = a.type; bVal = b.type;
      } else if (sortColumn === 'size') {
        aVal = parseFloat(a.size); bVal = parseFloat(b.size);
      } else if (sortColumn === 'color') {
        aVal = a.useColorSilk ? 1 : 0; bVal = b.useColorSilk ? 1 : 0;
      } else {
        aVal = new Date(a.timestamp); bVal = new Date(b.timestamp);
      }
      return sortDirection === 'asc' ? (aVal > bVal ? 1 : -1) : (aVal < bVal ? 1 : -1);
    });

    HistoryList.innerHTML = '';
    for (const item of sorted) {
      const row = document.createElement('tr');
      row.dataset.id = item.id;

      const checkCell = document.createElement('td');
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'row-checkbox';
      checkbox.onchange = updateBatchDeleteBtn;
      checkCell.appendChild(checkbox);

      const previewCell = document.createElement('td');
      const color = item.useColorSilk ? item.color : '#000000';
      const canvas = item.type === 'qrcode' ? await generateQRCode(item.content, color) : await generateBarcode(item.content, color);
      if (canvas) {
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.className = 'preview-img';
        previewCell.appendChild(img);
      }

      const typeCell = document.createElement('td');
      const tag = document.createElement('span');
      tag.className = `type-tag ${item.type === 'qrcode' ? 'qrcode-tag' : 'barcode-tag'}`;
      tag.textContent = item.type === 'qrcode' ? '二维码' : '条形码';
      typeCell.appendChild(tag);

      const sizeCell = document.createElement('td');
      sizeCell.textContent = item.size;

      const contentCell = document.createElement('td');
      contentCell.className = 'content-cell';
      contentCell.textContent = item.content;
      contentCell.title = item.content;

      const colorCell = document.createElement('td');
      colorCell.textContent = item.useColorSilk ? '是' : '否';
      colorCell.dataset.color = item.useColorSilk ? '是' : '否';

      const opCell = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '删除';
      delBtn.onclick = (e) => {
        e.stopPropagation();
        showConfirmDialog('确定要删除这条记录吗？', async () => {
          try {
            await deleteHistoryItem(item.id);
            showMessage('删除成功');
            loadHistory();
          } catch (err) {
            showMessage('删除失败');
          }
        });
      };
      opCell.appendChild(delBtn);

      row.append(checkCell, previewCell, typeCell, sizeCell, contentCell, colorCell, opCell);
      HistoryList.appendChild(row);
    }
    applyFilters();
  }

  function updateBatchDeleteBtn() {
    const checked = document.querySelectorAll('.row-checkbox:checked').length;
    BatchDeleteBtn.style.display = checked > 0 ? 'inline-block' : 'none';
    BatchDeleteBtn.textContent = `批量删除 (${checked})`;
  }

  function base64ToBlob(b64, type) {
    const bytes = atob(b64.split(',')[1]);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type });
  }

  SelectAllCheckbox.onchange = () => {
    document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = SelectAllCheckbox.checked);
    updateBatchDeleteBtn();
  };

  BatchDeleteBtn.onclick = () => {
    const checked = Array.from(document.querySelectorAll('.row-checkbox:checked'));
    showConfirmDialog(`确定要删除选中的 ${checked.length} 条记录吗？`, async () => {
      let success = 0;
      for (const cb of checked) {
        try {
          const id = cb.closest('tr').dataset.id;
          await deleteHistoryItem(id);
          success++;
        } catch (e) {}
      }
      showMessage(`成功删除 ${success} 条记录`);
      loadHistory();
    });
  };

  ExportJsonBtn.onclick = () => {
    const json = JSON.stringify(allData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `history_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showMessage('导出成功');
  };

  ExportCsvBtn.onclick = () => {
    const csv = ['类型,内容,尺寸(mm),彩色丝印,时间'].concat(allData.map(d => `${d.type === 'qrcode' ? '二维码' : '条形码'},"${d.content}",${d.size},${d.useColorSilk ? '是' : '否'},${d.timestamp}`)).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `history_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showMessage('导出成功');
  };

  ClearButton.onclick = () => {
    showConfirmDialog('确定要清空所有历史记录吗？此操作不可恢复！', async () => {
      try {
        const all = await eda.sys_Storage.getExtensionAllUserConfigs();
        const keys = Object.keys(all).filter(k => k.includes('qrcode') || k.includes('barcode'));
        let ok = 0;
        for (const k of keys) {
          try { await deleteHistoryItem(k); ok++; } catch (e) {}
        }
        showMessage(`成功清空 ${ok} 条记录`);
        loadHistory();
      } catch {
        showMessage('清空失败');
      }
    });
  };

  BackButton.onclick = () => {
    eda.sys_IFrame.closeIFrame('');
    eda.sys_IFrame.openIFrame('/iframe/index.html', 600, 600, 'bonding_pad');
  };

  HistoryList.addEventListener('click', (e) => {
    const row = e.target.closest('tr:not(.empty-row):not(.filter-row)');
    if (!row || e.target.closest('button, input[type="checkbox"]')) return;
    showMessage('双击可以放置到画布');
  });

  HistoryList.addEventListener('dblclick', async (e) => {
    const row = e.target.closest('tr:not(.empty-row):not(.filter-row)');
    if (!row || e.target.closest('button, input[type="checkbox"]')) return;

    if (followInterval) {
      clearInterval(followInterval);
      followInterval = null;
    }

    const item = allData.find(d => d.id === row.dataset.id);
    if (!item) return;

    const color = item.useColorSilk ? item.color : '#000000';
    const canvas = item.type === 'qrcode' ? await generateQRCode(item.content, color) : await generateBarcode(item.content, color);
    if (!canvas) { showMessage('图像生成失败'); return; }

    const base64 = canvas.toDataURL('image/png');
    const size = parseFloat(item.size);
    let width = size / 0.0254;
    let height = size / 0.0254;
    if (item.type === 'barcode') width *= 3;

    const blob = base64ToBlob(base64, 'image/png');
    const pt = await eda.pcb_SelectControl.getCurrentMousePosition();

    let ID;
    if (item.useColorSilk) {
      const obj = eda.pcb_PrimitiveObject.create(EPCB_LayerId.TOP_SILKSCREEN, pt.x, pt.y, base64, width, height, 0, false, 'img', false);
      ID = (await obj).getState_PrimitiveId();
      isCurrentColorImage = true;
    } else {
      const edaImage = await eda.pcb_MathPolygon.convertImageToComplexPolygon(blob, width, height, 0.5, 0.5, 0, 0, true, false);
      const imgObj = eda.pcb_PrimitiveImage.create(pt.x, pt.y, edaImage, EPCB_LayerId.TOP_SILKSCREEN, width, height, 0, false, false);
      ID = (await imgObj).getState_PrimitiveId();
      isCurrentColorImage = false;
    }

    currentImageID = ID;
    showMessage('图像已附着到鼠标，点击画布放置');

    followInterval = setInterval(async () => {
      try {
        const pos = await eda.pcb_SelectControl.getCurrentMousePosition();
        if (isCurrentColorImage) {
          await eda.pcb_PrimitiveObject.modify(currentImageID, { topLeftX: pos.x, topLeftY: pos.y });
        } else {
          await eda.pcb_PrimitiveImage.modify(currentImageID, { x: pos.x, y: pos.y });
        }
      } catch (e) {
        if (followInterval) { clearInterval(followInterval); followInterval = null; }
      }
    }, 16);
  });

  window.onblur = () => {
    if (followInterval) {
      clearInterval(followInterval);
      followInterval = null;
      currentImageID = null;
      showMessage("图像已放置");
    }
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && followInterval) {
      clearInterval(followInterval);
      followInterval = null;
      currentImageID = null;
      showMessage("已取消放置");
    }
  });

  setupFilterListeners();
  loadHistory();
});
</script>
</body>
</html>
